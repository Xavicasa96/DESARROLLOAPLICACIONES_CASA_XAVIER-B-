<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea Semana 6 - Versión Fácil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="container mt-4">

    <h2 class="text-center mb-4">Registro Rápido</h2>

    <!-- Mensaje de Alerta -->
    <div id="mensaje" class="alert d-none text-center"></div>

    <!-- Formulario -->
    <form id="miFormulario" novalidate>
        <div class="mb-3">
            <label class="form-label">Título:</label>
            <input type="text" id="titulo" class="form-control" placeholder="Ej. Tarea de TI">
            <div class="invalid-feedback">Debe tener al menos 4 letras.</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Descripción:</label>
            <textarea id="descripcion" class="form-control" placeholder="Detalles..."></textarea>
            <div class="invalid-feedback">Debe tener al menos 15 letras.</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Estado:</label>
            <select id="estado" class="form-control">
                <option value="">Seleccione...</option>
                <option value="Pendiente">Pendiente</option>
                <option value="Completado">Completado</option>
            </select>
            <div class="invalid-feedback">Debe seleccionar una opción.</div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Guardar Registro</button>
    </form>

    <hr class="my-4">

    <!-- Lista y Contador -->
    <h4>Lista de Registros (Total: <span id="contador">0</span>)</h4>
    <ul id="lista" class="list-group mt-3"></ul>

    <script src="script.js"></script>
</body>
</html>
