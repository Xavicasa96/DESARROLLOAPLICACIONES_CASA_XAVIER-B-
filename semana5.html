<div class="container my-5">
    <div class="row">
        <div class="col-md-5 mb-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="card-title mb-4">Nuevo Registro</h4>
                    <form id="mainForm">
                        <div class="mb-3">
                            <label for="inputName" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="inputName">
                            <div class="invalid-feedback">Por favor, ingresa un nombre.</div>
                        </div>
                        <div class="mb-3">
                            <label for="inputDesc" class="form-label">Descripción</label>
                            <textarea class="form-control" id="inputDesc" rows="3"></textarea>
                            <div class="invalid-feedback">Por favor, ingresa una descripción.</div>
                        </div>
                        <div class="mb-3">
                            <label for="selectCategory" class="form-label">Categoría / Tipo</label>
                            <select class="form-select" id="selectCategory">
                                <option value="">Seleccione una opción...</option>
                                <option value="Tecnología">Tecnología</option>
                                <option value="Servicio">Servicio</option>
                                <option value="Gestión">Gestión</option>
                            </select>
                            <div class="invalid-feedback">Por favor, selecciona una categoría.</div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Agregar Registro</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>Registros Actuales</h3>
                <span class="badge bg-info text-dark fs-6">
                    Total: <span id="totalCounter">0</span>
                </span>
            </div>
            <div id="recordsContainer" class="row g-3">
                </div>
        </div>
    </div>
</div>
